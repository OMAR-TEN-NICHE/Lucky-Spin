<script>
// ─── Updated Prize Config (Total Weight: 100) ──────────────────────
const PRIZES = [
  { label:"1 PACK",     emoji:"📦", name:"1 Pack Vibe+",        desc:"Get 1 extra pack added to your order!",      color:"#E8B84B", textColor:"#0D1B2A", weight: 15 },
  { label:"2 PACK",     emoji:"📦📦", name:"2 Packs Vibe+",     desc:"Double the energy! 2 extra packs for you.",  color:"#1D9E75", textColor:"#fff",    weight: 3  },
  { label:"5% OFF",     emoji:"🏷️", name:"5% Voucher",         desc:"Enjoy 5% off your next purchase.",           color:"#E8B84B", textColor:"#0D1B2A", weight: 45 },
  { label:"10% OFF",    emoji:"🎟️", name:"10% Voucher",        desc:"Enjoy 10% off your next purchase.",          color:"#1D9E75", textColor:"#fff",    weight: 30 },
  { label:"50% OFF",    emoji:"🔥", name:"50% Voucher",        desc:"Huge Savings! Half price on your next buy.", color:"#E8B84B", textColor:"#0D1B2A", weight: 5  },
  { label:"FREE BOX",   emoji:"🎁", name:"Free Vibe+ Box",     desc:"A whole box of Vibe+ patches for free!",     color:"#1D9E75", textColor:"#fff",    weight: 1.5},
  { label:"6 BOX SET",  emoji:"🏆", name:"Set of 6 Boxes",     desc:"The Ultimate Prize! 6 full Vibe+ boxes.",    color:"#E8B84B", textColor:"#0D1B2A", weight: 0.5}
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
let currentRotation = 0;

// Draw the wheel with updated labels
function drawWheel() {
  const arc = (2 * Math.PI) / PRIZES.length;
  PRIZES.forEach((p, i) => {
    const angle = i * arc;
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.moveTo(160, 160);
    ctx.arc(160, 160, 155, angle, angle + arc);
    ctx.fill();

    ctx.save();
    ctx.translate(160, 160);
    ctx.rotate(angle + arc / 2);
    ctx.fillStyle = p.textColor;
    ctx.font = "bold 14px Orbitron";
    ctx.textAlign = "right";
    ctx.fillText(p.label, 140, 5);
    ctx.restore();
  });
}
drawWheel();

// Weighted Logic: Selects prize based on your % chances
function getWeightedRandomPrize() {
  const totalWeight = PRIZES.reduce((sum, p) => sum + p.weight, 0);
  let random = Math.random() * totalWeight;
  for (let i = 0; i < PRIZES.length; i++) {
    if (random < PRIZES[i].weight) return i;
    random -= PRIZES[i].weight;
  }
  return 0;
}

function spinWheel() {
  spinBtn.disabled = true;
  const prizeIndex = getWeightedRandomPrize();
  const arc = 360 / PRIZES.length;
  
  // Calculate rotation to land on the slice
  const extraSpins = 5 * 360; 
  const finalAngle = extraSpins + (360 - (prizeIndex * arc) - (arc / 2));
  
  currentRotation += finalAngle;
  canvas.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
  canvas.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    showResult(PRIZES[prizeIndex]);
  }, 4100);
}

// ... rest of your UI logic (submitCode, claimPrize, etc.) ...
</script>
